name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest

  gate:
    name: seam gate (example traces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      # The golden trace must pass the gate (exit 0).
      - name: Golden trace passes the gate
        run: seamproof check -c contracts -t examples/traces/golden_happy_path.json
      # An injected seam failure must block the gate (exit 1). We invert it so
      # CI stays green while proving the gate actually fails closed.
      - name: Injected failure blocks the gate
        run: |
          if seamproof check -c contracts -t examples/traces/seam1_amount_mismatch.json; then
            echo "::error::SeamProof did not block a known seam-1 violation"; exit 1
          else
            echo "Gate correctly blocked the seam-1 violation"
          fi
      # Ingest a Maestro OpenTelemetry export and gate it — must also fail closed.
      - name: OTLP ingest gates closed
        run: |
          if seamproof check -c contracts --otel examples/otel/maestro_seam1_export.json; then
            echo "::error::OTLP ingest did not block seam-1"; exit 1
          else
            echo "OTLP ingest path blocked seam-1"
          fi
      # Render the Test Manager payload offline (no tenant needed).
      - name: Publish dry-run renders a Test Manager payload
        run: seamproof publish -c contracts --otel examples/otel/maestro_seam1_export.json --base-url https://cloud.uipath.com --project demo --dry-run
